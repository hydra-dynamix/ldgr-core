name: Binary release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version to release. Must match Cargo.toml."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub release as prerelease"
        required: true
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  metadata:
    name: Validate release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve and validate version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          cargo_version="$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; data=json.load(sys.stdin); print(next(p["version"] for p in data["packages"] if p["name"]=="ldgr-core"))')"
          requested_version="${{ github.event_name == 'workflow_dispatch' && inputs.version || '' }}"
          version="${requested_version:-$cargo_version}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
            echo "version must use semantic version syntax" >&2
            exit 1
          fi
          if [[ "$version" != "$cargo_version" ]]; then
            echo "requested version $version does not match Cargo.toml version $cargo_version" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "tag ${GITHUB_REF_NAME} does not match Cargo.toml version v${version}" >&2
            exit 1
          fi
          prerelease="true"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            prerelease="${{ inputs.prerelease }}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.platform }} binary release
    needs: metadata
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x86_64
            binary_ext: ""
          - os: ubuntu-24.04-arm
            platform: linux-aarch64
            binary_ext: ""
          - os: macos-15-intel
            platform: macos-x86_64
            binary_ext: ""
          - os: macos-14
            platform: macos-aarch64
            binary_ext: ""
          - os: windows-latest
            platform: windows-x86_64
            binary_ext: ".exe"
    env:
      PACKAGE: ldgr-core
      BINARY: ldgr
      RELEASE_NAME: ldgr-core
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build binary
        run: cargo build --locked --release -p "$PACKAGE"
        shell: bash

      - name: Smoke test binary
        run: "target/release/${BINARY}${{ matrix.binary_ext }} --version"
        shell: bash

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          platform="${{ matrix.platform }}"
          binary_file="${BINARY}${{ matrix.binary_ext }}"
          staging="dist/${RELEASE_NAME}-${version}/${platform}"
          archive="dist/${RELEASE_NAME}-${version}-${platform}.tar.gz"
          mkdir -p "$staging"
          cp "target/release/${binary_file}" "$staging/${binary_file}"
          chmod +x "$staging/${binary_file}" || true
          cp README.md LICENSE "dist/${RELEASE_NAME}-${version}/"
          if [[ -f scripts/install.sh ]]; then mkdir -p "dist/${RELEASE_NAME}-${version}/scripts"; cp scripts/install.sh "dist/${RELEASE_NAME}-${version}/scripts/install.sh"; fi
          cat > "dist/${RELEASE_NAME}-${version}/RELEASE-METADATA.json" <<JSON
          {
            "schema_version": 1,
            "package": "${PACKAGE}",
            "binary": "${BINARY}",
            "version": "${version}",
            "platform": "${platform}",
            "commit": "${GITHUB_SHA}",
            "source_repository": "${GITHUB_REPOSITORY}"
          }
          JSON
          tar -C dist -czf "$archive" "${RELEASE_NAME}-${version}"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "${archive}.sha256"
          else
            shasum -a 256 "$archive" > "${archive}.sha256"
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/ldgr-core-${{ needs.metadata.outputs.version }}-${{ matrix.platform }}.tar.gz
            dist/ldgr-core-${{ needs.metadata.outputs.version }}-${{ matrix.platform }}.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish complete release
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_NAME: ldgr-core
    steps:
      - uses: actions/checkout@v4

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Verify complete release matrix
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          platforms=(linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64 windows-x86_64)
          for platform in "${platforms[@]}"; do
            archive="dist/${RELEASE_NAME}-${version}-${platform}.tar.gz"
            test -s "$archive"
            test -s "${archive}.sha256"
            sha256sum -c "${archive}.sha256"
          done
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz' | wc -l)" -eq 5
          test "$(find dist -maxdepth 1 -type f -name '*.tar.gz.sha256' | wc -l)" -eq 5

      - name: Create or update GitHub release
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.metadata.outputs.version }}"
          tag="v${version}"
          title="${RELEASE_NAME} v${version}"
          prerelease_flag=""
          if [[ "${{ needs.metadata.outputs.prerelease }}" == "true" ]]; then
            prerelease_flag="--prerelease"
          fi
          if ! gh release view "$tag" >/dev/null 2>&1; then
            gh release create "$tag" --title "$title" --notes "${RELEASE_NAME} ${version} binary release from ${GITHUB_SHA}." $prerelease_flag
          fi
          gh release upload "$tag" dist/*.tar.gz dist/*.tar.gz.sha256 --clobber
